<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smartcard & Buku Balance Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <!-- Simulated Phone Frame -->
  <div class="device-container">
    <div class="device-notch"></div>
    
    <div class="app-screen">
      <!-- Scrollable Container -->
      <div class="scroll-area" id="scrollArea">
        
        <!-- Purple Top Header Card -->
        <header class="header-card">
          <div class="top-nav">
            <span class="top-title">Total Uang Smartcard</span>
          </div>
          
          <div class="main-balance-container">
            <div class="balance-value" id="totalBalance">Rp 0</div>
            <div class="balance-update-time" id="lastUpdatedLabel">Update Terakhir: -</div>
          </div>
          
          <div class="balance-breakdown">
            <div class="breakdown-row">
              <span class="breakdown-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                Total Uang Modal
              </span>
              <div class="breakdown-value">
                <span id="smartcardBalanceLabel">Rp 0</span>
                <button class="edit-smartcard-btn" id="btnEditSmartcard" aria-label="Edit Total Uang Modal">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </button>
              </div>
            </div>
            <div class="breakdown-row" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
              <span class="breakdown-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Total Uang Buku
              </span>
              <div class="breakdown-value">
                <span id="bukuBalanceLabel">Rp 0</span>
              </div>
            </div>
          </div>
        </header>

        <!-- Dynamic Main Views -->
        <main id="mainContent" class="main-slider-container">
          <div class="views-slider" id="viewsSlider">
            
            <!-- HOME PAGE -->
            <section id="viewHome" class="section-container">
              
              <div class="section-header">
                <div class="section-title-wrapper">
                  <h2 class="section-title">Daftar Nominal</h2>
                  <span class="section-subtitle" id="entriesCount">0 Catatan</span>
                </div>
                <div class="view-controls">
                  <button class="view-btn active" id="btnViewCompact">Ringkas</button>
                  <button class="view-btn" id="btnViewDetail">Detail</button>
                </div>
              </div>

              <!-- Add Nominal Quick Action -->
              <div class="action-row">
                <button class="add-nominal-btn" id="btnOpenAddModal">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                  Tambah Catatan Nominal
                </button>
              </div>

              <!-- Nominal List -->
              <div class="nominal-list" id="nominalList">
                <!-- JS Injected Cards -->
              </div>

            </section>

            <!-- AUDIT LOG PAGE -->
            <section id="viewHistory" class="section-container">
              <div class="section-header">
                <div class="section-title-wrapper">
                  <h2 class="section-title">Riwayat Edit</h2>
                  <span class="section-subtitle">Audit log aktifitas nominal</span>
                </div>
              </div>
              
              <div class="history-timeline" id="historyTimeline">
                <!-- JS Injected Timeline items -->
              </div>
            </section>

          </div>
        </main>
      </div>

      <!-- Bottom Nav Bar -->
      <nav class="bottom-nav">
        <button class="nav-item active" id="navHome">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" id="navHistory">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <span>Riwayat Edit</span>
        </button>
      </nav>

    </div>
  </div>

  <!-- MODAL: ADD / EDIT NOMINAL -->
  <div class="modal-overlay" id="nominalModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3 class="modal-title" id="nominalModalTitle">Tambah Nominal Baru</h3>
        <button class="modal-close-btn" id="btnCloseNominalModal" aria-label="Tutup modal">✕</button>
      </div>
      
      <form id="nominalForm" onsubmit="return false;">
        <!-- Hidden input for editing -->
        <input type="hidden" id="entryIndex" value="">

        <div class="form-group">
          <label class="form-label" for="inputNominal">Nominal Rupiah</label>
          <input type="number" id="inputNominal" class="input-field" placeholder="Contoh: 1650000" required>
          <div class="formatted-amount-hint" id="inputNominalFormatted">Rp 0</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="inputKeterangan">Keterangan Catatan</label>
          <input type="text" id="inputKeterangan" class="input-field" placeholder="Contoh: Ishan Ahmad / Beli pen" required>
        </div>

        <div class="form-group" id="formGroupTanggal">
          <label class="form-label" for="inputTanggal">Tanggal</label>
          <input type="date" id="inputTanggal" class="input-field" required>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btnCancelNominalModal">Batal</button>
          <button type="submit" class="btn btn-primary" id="btnSaveNominal">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: EDIT SMARTCARD BALANCE (TOTAL UANG MODAL) -->
  <div class="modal-overlay" id="smartcardModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3 class="modal-title">Edit Total Uang Modal</h3>
        <button class="modal-close-btn" id="btnCloseSmartcardModal" aria-label="Tutup modal">✕</button>
      </div>
      
      <form id="smartcardForm" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="inputSmartcard">Total Uang Modal Saat Ini</label>
          <input type="number" id="inputSmartcard" class="input-field" placeholder="Contoh: 1324100" required>
          <div class="formatted-amount-hint" id="inputSmartcardFormatted">Rp 0</div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btnCancelSmartcardModal">Batal</button>
          <button type="submit" class="btn btn-primary" id="btnSaveSmartcard">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Load core JS scripts -->
  <script src="src/data.js"></script>
  <script src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
